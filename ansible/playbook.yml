---
- name: Deploy Node.js app on EC2
  hosts: all
  become: yes
  vars:
    app_dir: /opt/app
    app_user: ubuntu
    node_version: "20"
    port: 3000

  tasks:

    - name: "Update apt cache"
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: "Install required system packages"
      apt:
        name:
          - curl
          - git
          - nginx
          - build-essential
        state: present

    - name: "Install Node.js 20 via NodeSource"
      shell: |
        curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
        apt-get install -y nodejs
      args:
        creates: /usr/bin/node

    - name: "Install PM2 globally"
      npm:
        name: pm2
        global: yes
        state: present

    - name: "Create app directory"
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0755"

    - name: "Copy application files to app directory"
      synchronize:
        src: ./
        dest: "{{ app_dir }}/"
        delete: yes
        rsync_opts:
          - "--exclude=.git"
          - "--exclude=node_modules"
          - "--exclude=.env"
      become: no

    - name: "Fix app directory ownership after sync"
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        recurse: yes

    - name: "Install local DB (postgres) if requested"
      block:
        - name: "Install PostgreSQL"
          apt:
            name:
              - postgresql
              - postgresql-contrib
              - python3-psycopg2
            state: present

        - name: "Start and enable PostgreSQL"
          systemd:
            name: postgresql
            state: started
            enabled: yes

        - name: "Fix pg_hba.conf scram-sha-256 to md5"
          shell: |
            PG_HBA=$(find /etc/postgresql -name pg_hba.conf | head -1)
            sed -i 's/scram-sha-256/md5/g' "$PG_HBA"
            systemctl reload postgresql
          args:
            executable: /bin/bash

        - name: "Create PostgreSQL database"
          shell: |
            sudo -u postgres psql -tc "SELECT 1 FROM pg_database WHERE datname='{{ db_name }}'" | grep -q 1 || \
            sudo -u postgres psql -c "CREATE DATABASE {{ db_name }};"
          args:
            executable: /bin/bash

        - name: "Create PostgreSQL user"
          shell: |
            sudo -u postgres psql -tc "SELECT 1 FROM pg_roles WHERE rolname='{{ db_username }}'" | grep -q 1 || \
            sudo -u postgres psql -c "CREATE USER {{ db_username }} WITH ENCRYPTED PASSWORD '{{ db_password }}';"
          args:
            executable: /bin/bash

        - name: "Grant privileges to PostgreSQL user"
          shell: |
            sudo -u postgres psql -c "GRANT ALL PRIVILEGES ON DATABASE {{ db_name }} TO {{ db_username }};"
          args:
            executable: /bin/bash

      when: install_db | default('false') == 'true' and db_type | default('') == 'postgres'

    - name: "Install local DB (mysql) if requested"
      block:
        - name: "Install MySQL"
          apt:
            name:
              - mysql-server
              - mysql-client
            state: present

        - name: "Start and enable MySQL"
          systemd:
            name: mysql
            state: started
            enabled: yes

        - name: "Create MySQL database and user"
          shell: |
            mysql -e "CREATE DATABASE IF NOT EXISTS {{ db_name }};"
            mysql -e "CREATE USER IF NOT EXISTS '{{ db_username }}'@'localhost' IDENTIFIED BY '{{ db_password }}';"
            mysql -e "GRANT ALL ON {{ db_name }}.* TO '{{ db_username }}'@'localhost';"
            mysql -e "FLUSH PRIVILEGES;"
          args:
            executable: /bin/bash

      when: install_db | default('false') == 'true' and db_type | default('') == 'mysql'

    - name: "Install local DB (mongodb) if requested"
      block:
        - name: "Install MongoDB prerequisites"
          apt:
            name:
              - gnupg
              - curl
            state: present

        - name: "Add MongoDB apt key"
          shell: |
            curl -fsSL https://www.mongodb.org/static/pgp/server-7.0.asc | \
              gpg --dearmor -o /usr/share/keyrings/mongodb-server-7.0.gpg
          args:
            creates: /usr/share/keyrings/mongodb-server-7.0.gpg

        - name: "Add MongoDB apt repository"
          shell: |
            echo "deb [ arch=amd64,arm64 signed-by=/usr/share/keyrings/mongodb-server-7.0.gpg ] \
            https://repo.mongodb.org/apt/ubuntu jammy/mongodb-org/7.0 multiverse" | \
            tee /etc/apt/sources.list.d/mongodb-org-7.0.list
          args:
            creates: /etc/apt/sources.list.d/mongodb-org-7.0.list

        - name: "Update apt cache for MongoDB"
          apt:
            update_cache: yes

        - name: "Install mongodb-org"
          apt:
            name: mongodb-org
            state: present

        - name: "Start and enable mongod"
          systemd:
            name: mongod
            state: started
            enabled: yes

        - name: "Create MongoDB database"
          shell: |
            mongosh --eval 'db.getSiblingDB("{{ db_name }}").createCollection("init")'
          args:
            executable: /bin/bash

      when: install_db | default('false') == 'true' and db_type | default('') == 'mongodb'

    - name: "Write /opt/app/.env using shell (safe when all vars empty)"
      shell: |
        printf '' > /opt/app/.env
        [ -n "{{ node_env_database_url | default('') }}" ] && echo "DATABASE_URL={{ node_env_database_url }}" >> /opt/app/.env || true
        [ -n "{{ node_env_mongo_uri | default('') }}" ]    && echo "MONGO_URI={{ node_env_mongo_uri }}"       >> /opt/app/.env || true
        [ -n "{{ node_env_db_host | default('') }}" ]      && echo "DB_HOST={{ node_env_db_host }}"           >> /opt/app/.env || true
        [ -n "{{ node_env_db_port | default('') }}" ]      && echo "DB_PORT={{ node_env_db_port }}"           >> /opt/app/.env || true
        [ -n "{{ node_env_db_name | default('') }}" ]      && echo "DB_NAME={{ node_env_db_name }}"           >> /opt/app/.env || true
        [ -n "{{ node_env_db_user | default('') }}" ]      && echo "DB_USER={{ node_env_db_user }}"           >> /opt/app/.env || true
        [ -n "{{ node_env_db_password | default('') }}" ]  && echo "DB_PASSWORD={{ node_env_db_password }}"   >> /opt/app/.env || true
        echo "PORT=3000"        >> /opt/app/.env
        echo "HOST=0.0.0.0"     >> /opt/app/.env
        chown {{ app_user }}:{{ app_user }} /opt/app/.env
        chmod 600 /opt/app/.env
      args:
        executable: /bin/bash

    - name: "Install npm dependencies"
      shell: |
        cd /opt/app
        npm install --production
      args:
        executable: /bin/bash
      become: yes
      become_user: "{{ app_user }}"

    - name: "Run npm build if build script exists"
      shell: |
        cd /opt/app
        if node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts.build ? 0 : 1)" 2>/dev/null; then
          npm run build
        fi
      args:
        executable: /bin/bash
      become: yes
      become_user: "{{ app_user }}"

    - name: "Start app with PM2"
      shell: |
        set -a
        [ -f /opt/app/.env ] && . /opt/app/.env
        export PORT=${PORT:-3000}
        export HOST=${HOST:-0.0.0.0}
        set +a

        pm2 delete app 2>/dev/null || true

        cd /opt/app

        if node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts.start ? 0 : 1)" 2>/dev/null; then
          pm2 start npm --name app -- start --update-env
        elif [ -f /opt/app/server.js ]; then
          pm2 start /opt/app/server.js --name app --update-env
        elif [ -f /opt/app/index.js ]; then
          pm2 start /opt/app/index.js --name app --update-env
        elif [ -f /opt/app/app.js ]; then
          pm2 start /opt/app/app.js --name app --update-env
        else
          echo "ERROR: No valid entrypoint found (start script, server.js, index.js, or app.js)"
          exit 1
        fi

        pm2 save
      args:
        executable: /bin/bash
      become: yes
      become_user: "{{ app_user }}"

    - name: "Configure PM2 startup systemd service"
      shell: |
        env PATH=$PATH:/usr/bin pm2 startup systemd -u {{ app_user }} --hp /home/{{ app_user }}
      args:
        executable: /bin/bash
        creates: /etc/systemd/system/pm2-ubuntu.service

    - name: "Configure Nginx reverse proxy"
      copy:
        dest: /etc/nginx/sites-available/default
        content: |
          server {
              listen 80 default_server;
              listen [::]:80 default_server;

              server_name _;

              location / {
                  proxy_pass         http://127.0.0.1:3000;
                  proxy_http_version 1.1;
                  proxy_set_header   Upgrade $http_upgrade;
                  proxy_set_header   Connection 'upgrade';
                  proxy_set_header   Host $host;
                  proxy_set_header   X-Real-IP $remote_addr;
                  proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header   X-Forwarded-Proto $scheme;
                  proxy_cache_bypass $http_upgrade;
              }
          }

    - name: "Restart Nginx"
      systemd:
        name: nginx
        state: restarted
        enabled: yes

    - name: "Wait for app to be ready on port 3000"
      wait_for:
        host: 127.0.0.1
        port: 3000
        timeout: 120
        delay: 10
      ignore_errors: yes
      register: wait_result

    - name: "Dump PM2 logs if app failed to start"
      shell: pm2 logs app --lines 100 --nostream
      args:
        executable: /bin/bash
      become: yes
      become_user: "{{ app_user }}"
      when: wait_result is failed

    - name: "Fail clearly if app did not start"
      fail:
        msg: "Application failed to start on port 3000. Check PM2 logs above."
      when: wait_result is failed

    - name: "Print server IP"
      debug:
        msg: "server_ip={{ ansible_host }}"