name: Deploy testweb5 node to EC2

on:
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.repository }}
  cancel-in-progress: false

jobs:
  provision:
    name: Provision EC2
    runs-on: ubuntu-latest
    outputs:
      server_ip: ${{ steps.get_ip.outputs.server_ip }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=us-east-1" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Terraform Apply
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -var="public_key=${{ secrets.EC2_SSH_PUBLIC_KEY }}" \
            -var="region=us-east-1"

      - name: Get server IP
        id: get_ip
        working-directory: terraform
        run: |
          SERVER_IP=$(terraform output -raw instance_public_ip)
          echo "server_ip=$SERVER_IP" >> "$GITHUB_OUTPUT"

  configure:
    name: Configure and Deploy
    runs-on: ubuntu-latest
    needs: provision
    env:
      ANSIBLE_HOST_KEY_CHECKING: "False"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ansible
        run: pip install ansible

      - name: Write SSH key
        run: |
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

      - name: Wait for SSH
        run: |
          SERVER_IP="${{ needs.provision.outputs.server_ip }}"
          echo "Waiting for SSH on $SERVER_IP..."
          for i in $(seq 1 30); do
            if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 -i /tmp/deploy_key ubuntu@$SERVER_IP "echo ok" 2>/dev/null; then
              echo "SSH ready"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "SSH never became available"
          exit 1

      - name: Write Ansible playbook
        run: |
          mkdir -p ansible
          cat > ansible/playbook.yml << 'PLAYBOOK_EOF'
          ---
          - name: Deploy node app
            hosts: all
            become: yes
            vars:
              app_dir: /opt/app
              app_user: ubuntu
              node_version: "20"

            tasks:
              - name: Update apt cache
                apt:
                  update_cache: yes
                  cache_valid_time: 3600

              - name: Install required packages
                apt:
                  name:
                    - curl
                    - git
                    - nginx
                    - build-essential
                  state: present

              - name: Install Node.js 20 via NodeSource
                shell: |
                  curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
                  apt-get install -y nodejs
                args:
                  creates: /usr/bin/node

              - name: Install PM2 globally
                npm:
                  name: pm2
                  global: yes
                  state: present

              - name: Create app directory
                file:
                  path: "{{ app_dir }}"
                  state: directory
                  owner: "{{ app_user }}"
                  group: "{{ app_user }}"
                  mode: "0755"

              - name: Install PostgreSQL
                apt:
                  name: postgresql
                  state: present
                when: install_db | default('') == 'true' and db_type | default('') == 'postgres'

              - name: Fix PostgreSQL SCRAM auth to md5
                shell: |
                  PG_HBA=$(find /etc/postgresql -name pg_hba.conf | head -1)
                  sed -i 's/scram-sha-256/md5/g' "$PG_HBA"
                  systemctl reload postgresql
                when: install_db | default('') == 'true' and db_type | default('') == 'postgres'

              - name: Create PostgreSQL database
                shell: |
                  sudo -u postgres psql -c "CREATE DATABASE {{ db_name }};" 2>/dev/null || true
                when: install_db | default('') == 'true' and db_type | default('') == 'postgres'

              - name: Create PostgreSQL user
                shell: |
                  sudo -u postgres psql -c "CREATE USER {{ db_username }} WITH ENCRYPTED PASSWORD '{{ db_password }}';" 2>/dev/null || true
                when: install_db | default('') == 'true' and db_type | default('') == 'postgres'

              - name: Grant PostgreSQL privileges
                shell: |
                  sudo -u postgres psql -c "GRANT ALL PRIVILEGES ON DATABASE {{ db_name }} TO {{ db_username }};" 2>/dev/null || true
                when: install_db | default('') == 'true' and db_type | default('') == 'postgres'

              - name: Install MySQL
                apt:
                  name: mysql-server
                  state: present
                when: install_db | default('') == 'true' and db_type | default('') == 'mysql'

              - name: Configure MySQL database and user
                shell: |
                  mysql -e "CREATE DATABASE IF NOT EXISTS {{ db_name }};"
                  mysql -e "CREATE USER IF NOT EXISTS '{{ db_username }}'@'localhost' IDENTIFIED BY '{{ db_password }}';"
                  mysql -e "GRANT ALL ON {{ db_name }}.* TO '{{ db_username }}'@'localhost';"
                when: install_db | default('') == 'true' and db_type | default('') == 'mysql'

              - name: Install MongoDB prerequisites
                apt:
                  name:
                    - gnupg
                    - wget
                  state: present
                when: install_db | default('') == 'true' and db_type | default('') == 'mongodb'

              - name: Install MongoDB
                apt:
                  name: mongodb-org
                  state: present
                when: install_db | default('') == 'true' and db_type | default('') == 'mongodb'

              - name: Start and enable MongoDB
                systemd:
                  name: mongod
                  state: started
                  enabled: yes
                when: install_db | default('') == 'true' and db_type | default('') == 'mongodb'

              - name: Create MongoDB database collection
                shell: |
                  mongosh --eval 'db.getSiblingDB("{{ db_name }}").createCollection("init")' 2>/dev/null || true
                when: install_db | default('') == 'true' and db_type | default('') == 'mongodb'

              - name: Sync application files
                synchronize:
                  src: "{{ playbook_dir }}/../"
                  dest: "{{ app_dir }}/"
                  delete: yes
                  recursive: yes
                  rsync_opts:
                    - "--exclude=.git"
                    - "--exclude=.github"
                    - "--exclude=node_modules"
                    - "--exclude=terraform"
                    - "--exclude=ansible"
                    - "--exclude=.env"

              - name: Set app directory ownership
                file:
                  path: "{{ app_dir }}"
                  state: directory
                  owner: "{{ app_user }}"
                  group: "{{ app_user }}"
                  recurse: yes

              - name: Write .env file
                shell: |
                  printf '' > {{ app_dir }}/.env
                  [ -n "{{ node_env_database_url | default('') }}" ] && echo "DATABASE_URL={{ node_env_database_url }}" >> {{ app_dir }}/.env || true
                  [ -n "{{ node_env_mongo_uri | default('') }}" ] && echo "MONGO_URI={{ node_env_mongo_uri }}" >> {{ app_dir }}/.env || true
                  [ -n "{{ node_env_db_host | default('') }}" ] && echo "DB_HOST={{ node_env_db_host }}" >> {{ app_dir }}/.env || true
                  [ -n "{{ node_env_db_port | default('') }}" ] && echo "DB_PORT={{ node_env_db_port }}" >> {{ app_dir }}/.env || true
                  [ -n "{{ node_env_db_name | default('') }}" ] && echo "DB_NAME={{ node_env_db_name }}" >> {{ app_dir }}/.env || true
                  [ -n "{{ node_env_db_user | default('') }}" ] && echo "DB_USER={{ node_env_db_user }}" >> {{ app_dir }}/.env || true
                  [ -n "{{ node_env_db_password | default('') }}" ] && echo "DB_PASSWORD={{ node_env_db_password }}" >> {{ app_dir }}/.env || true
                  echo "PORT=3000" >> {{ app_dir }}/.env
                  echo "HOST=0.0.0.0" >> {{ app_dir }}/.env
                  chown {{ app_user }}:{{ app_user }} {{ app_dir }}/.env
                  chmod 600 {{ app_dir }}/.env

              - name: Install npm dependencies
                shell: |
                  cd {{ app_dir }}
                  npm install --production
                become_user: "{{ app_user }}"

              - name: Run npm build if build script exists
                shell: |
                  cd {{ app_dir }}
                  if node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts.build ? 0 : 1)" 2>/dev/null; then
                    npm run build
                  fi
                become_user: "{{ app_user }}"

              - name: Delete existing PM2 app
                shell: |
                  pm2 delete app 2>/dev/null || true
                become_user: "{{ app_user }}"

              - name: Start app with PM2
                shell: |
                  set -a
                  [ -f {{ app_dir }}/.env ] && . {{ app_dir }}/.env
                  export PORT=${PORT:-3000}
                  export HOST=${HOST:-0.0.0.0}
                  set +a
                  cd {{ app_dir }}
                  if node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts.start ? 0 : 1)" 2>/dev/null; then
                    pm2 start npm --name app -- start --update-env
                  elif [ -f {{ app_dir }}/server.js ]; then
                    pm2 start {{ app_dir }}/server.js --name app --update-env
                  elif [ -f {{ app_dir }}/index.js ]; then
                    pm2 start {{ app_dir }}/index.js --name app --update-env
                  elif [ -f {{ app_dir }}/app.js ]; then
                    pm2 start {{ app_dir }}/app.js --name app --update-env
                  else
                    echo "ERROR: No valid entrypoint found"
                    exit 1
                  fi
                become_user: "{{ app_user }}"

              - name: Save PM2 process list
                shell: pm2 save
                become_user: "{{ app_user }}"

              - name: Setup PM2 startup systemd service
                shell: |
                  env PATH=$PATH:/usr/bin pm2 startup systemd -u ubuntu --hp /home/ubuntu
                args:
                  creates: /etc/systemd/system/pm2-ubuntu.service

              - name: Configure Nginx reverse proxy
                copy:
                  dest: /etc/nginx/sites-available/app
                  content: |
                    server {
                        listen 80;
                        server_name _;

                        location / {
                            proxy_pass http://127.0.0.1:3000;
                            proxy_http_version 1.1;
                            proxy_set_header Upgrade $http_upgrade;
                            proxy_set_header Connection 'upgrade';
                            proxy_set_header Host $host;
                            proxy_set_header X-Real-IP $remote_addr;
                            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                            proxy_set_header X-Forwarded-Proto $scheme;
                            proxy_cache_bypass $http_upgrade;
                        }
                    }

              - name: Enable Nginx site
                file:
                  src: /etc/nginx/sites-available/app
                  dest: /etc/nginx/sites-enabled/app
                  state: link

              - name: Remove default Nginx site
                file:
                  path: /etc/nginx/sites-enabled/default
                  state: absent

              - name: Test Nginx configuration
                command: nginx -t

              - name: Restart Nginx
                systemd:
                  name: nginx
                  state: restarted
                  enabled: yes

              - name: Wait for app to be ready
                wait_for:
                  host: 127.0.0.1
                  port: 3000
                  timeout: 120
                  delay: 10
                ignore_errors: yes
                register: app_wait

              - name: Dump PM2 logs on failure
                shell: pm2 logs app --lines 100 --nostream
                become_user: "{{ app_user }}"
                when: app_wait.failed | default(false)

              - name: Fail if app did not start
                fail:
                  msg: "Application did not start on port 3000 within timeout"
                when: app_wait.failed | default(false)

              - name: Print server IP
                debug:
                  msg: "server_ip={{ ansible_host }}"
          PLAYBOOK_EOF

      - name: Run Ansible playbook
        run: |
          SERVER_IP="${{ needs.provision.outputs.server_ip }}"
          ansible-playbook ansible/playbook.yml \
            -i "$SERVER_IP," \
            -u ubuntu \
            --private-key /tmp/deploy_key \
            -e "node_env_database_url='${{ secrets.DATABASE_URL }}'" \
            -e "node_env_mongo_uri='${{ secrets.MONGO_URI }}'" \
            -e "node_env_db_host='${{ secrets.DB_HOST }}'" \
            -e "node_env_db_port='${{ secrets.DB_PORT }}'" \
            -e "node_env_db_name='${{ secrets.DB_NAME }}'" \
            -e "node_env_db_user='${{ secrets.DB_USER }}'" \
            -e "node_env_db_password='${{ secrets.DB_PASSWORD }}'" \
            -e "install_db='${{ secrets.INSTALL_DB_ON_EC2 }}'" \
            -e "db_type='${{ secrets.DB_TYPE }}'" \
            -e "db_name='${{ secrets.DB_NAME }}'" \
            -e "db_username='${{ secrets.DB_USERNAME }}'" \
            -e "db_password='${{ secrets.DB_PASSWORD }}'"

  verify:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: [provision, configure]
    steps:
      - name: Check health endpoint
        run: |
          SERVER_IP="${{ needs.provision.outputs.server_ip }}"
          echo "Verifying deployment at http://$SERVER_IP/health"
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 http://$SERVER_IP/health 2>/dev/null || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed"
              exit 0
            fi
            sleep 10
          done
          echo "Health check failed after all attempts"
          exit 1

      - name: Print deployment URL
        run: |
          SERVER_IP="${{ needs.provision.outputs.server_ip }}"
          echo "Deployment successful!"
          echo "Application URL: http://$SERVER_IP"
          echo "Health URL: http://$SERVER_IP/health"

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [provision, verify]
    if: always()
    steps:
      - name: Deployment status
        run: |
          SERVER_IP="${{ needs.provision.outputs.server_ip }}"
          if [ "${{ needs.verify.result }}" = "success" ]; then
            echo "Deployment SUCCEEDED"
            echo "Project : testweb5"
            echo "App     : node"
            echo "Region  : us-east-1"
            echo "Target  : EC2 (direct)"
            echo "URL     : http://$SERVER_IP"
          else
            echo "Deployment FAILED"
            echo "Project : testweb5"
            echo "App     : node"
            echo "Region  : us-east-1"
            echo "Target  : EC2 (direct)"
            echo "Server IP: $SERVER_IP"
            exit 1
          fi