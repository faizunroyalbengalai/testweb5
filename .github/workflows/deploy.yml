name: Deploy testweb5 node to EC2

on:
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.repository }}
  cancel-in-progress: false

jobs:
  provision:
    name: Provision EC2
    runs-on: ubuntu-latest
    outputs:
      server_ip: ${{ steps.get_ip.outputs.server_ip }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=us-east-1" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Terraform Apply
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -var="public_key=${{ secrets.EC2_SSH_PUBLIC_KEY }}"

      - name: Get server IP
        id: get_ip
        working-directory: terraform
        run: |
          SERVER_IP=$(terraform output -raw instance_public_ip)
          echo "server_ip=$SERVER_IP" >> "$GITHUB_OUTPUT"

  configure:
    name: Configure and Deploy
    runs-on: ubuntu-latest
    needs: provision
    env:
      ANSIBLE_HOST_KEY_CHECKING: "False"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ansible
        run: pip install ansible

      - name: Write SSH key
        run: |
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

      - name: Wait for SSH
        run: |
          SERVER_IP="${{ needs.provision.outputs.server_ip }}"
          echo "Waiting for SSH on $SERVER_IP..."
          for i in $(seq 1 30); do
            if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 -i /tmp/deploy_key ubuntu@$SERVER_IP "echo ok" 2>/dev/null; then
              echo "SSH ready"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "SSH never became available"
          exit 1

      - name: Write Ansible playbook
        run: |
          mkdir -p ansible
          cat > ansible/playbook.yml << 'PLAYBOOK_EOF'
          ---
          - name: Deploy node app
            hosts: all
            become: yes
            vars:
              app_dir: /opt/app
              app_user: ubuntu
              node_version: "20"

            tasks:
              - name: Update apt cache
                apt:
                  update_cache: yes
                  cache_valid_time: 3600

              - name: Install required packages
                apt:
                  name:
                    - curl
                    - git
                    - nginx
                    - build-essential
                  state: present

              - name: Install Node.js 20 via NodeSource
                shell: |
                  curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
                  apt-get install -y nodejs
                args:
                  creates: /usr/bin/node

              - name: Install PM2 globally
                npm:
                  name: pm2
                  global: yes
                  state: present

              - name: Create app directory
                file:
                  path: "{{ app_dir }}"
                  state: directory
                  owner: "{{ app_user }}"
                  group: "{{ app_user }}"
                  mode: "0755"

              - name: Install PostgreSQL
                apt:
                  name: postgresql
                  state: present
                when: install_db | default('') == 'true' and db_type | default('') == 'postgres'

              - name: Fix PostgreSQL SCRAM auth to md5
                shell: |
                  PG_HBA=$(find /etc/postgresql -name pg_hba.conf | head -1)
                  sed -i 's/scram-sha-256/md5/g' "$PG_HBA"
                  systemctl reload postgresql
                when: install_db | default('') == 'true' and db_type | default('') == 'postgres'

              - name: Create PostgreSQL database
                shell: |
                  sudo -u postgres psql -c "CREATE DATABASE {{ db_name }};" 2>/dev/null || true
                when: install_db | default('') == 'true' and db_type | default('') == 'postgres'

              - name: Create PostgreSQL user
                shell: |
                  sudo -u postgres psql -c "CREATE USER {{ db_username }} WITH ENCRYPTED PASSWORD '{{ db_password }}';" 2>/dev/null || true
                when: install_db | default('') == 'true' and db_type | default('') == 'postgres'

              - name: Grant PostgreSQL privileges
                shell: |
                  sudo -u postgres psql -c "GRANT ALL PRIVILEGES ON DATABASE {{ db_name }} TO {{ db_username }};" 2>/dev/null || true
                when: install_db | default('') == 'true' and db_type | default('') == 'postgres'

              - name: Install MySQL
                apt:
                  name: mysql-server
                  state: present
                when: install_db | default('') == 'true' and db_type | default('') == 'mysql'

              - name: Configure MySQL database and user
                shell: |
                  mysql -e "CREATE DATABASE IF NOT EXISTS {{ db_name }};"
                  mysql -e "CREATE USER IF NOT EXISTS '{{ db_username }}'@'localhost' IDENTIFIED BY '{{ db_password }}';"
                  mysql -e "GRANT ALL ON {{ db_name }}.* TO '{{ db_username }}'@'localhost';"
                when: install_db | default('') == 'true' and db_type | default('') == 'mysql'

              - name: Install MongoDB prerequisites
                apt:
                  name:
                    - gnupg
                    - wget
                  state: present
                when: install_db | default('') == 'true' and db_type | default('') == 'mongodb'

              - name: Install MongoDB
                apt:
                  name: mongodb-org
                  state: present
                when: install_db | default('') == 'true' and db_type | default('') == 'mongodb'

              - name: Start and enable MongoDB
                systemd:
                  name: mongod
                  state: started
                  enabled: yes
